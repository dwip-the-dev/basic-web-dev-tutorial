<!DOCTYPE html>
<!--
Tutorial File: tutorial_html/hyperlinks.html
Lesson Title: Hyperlinks Tutorial
Purpose: This page is part of the course and is documented for beginners.
-->
<html lang="en">
<head>
    <!-- Sets standard text encoding -->
    <meta charset="UTF-8">
    <!-- Makes page responsive on smaller screens -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Text shown on browser tab -->
    <title>Hyperlinks Tutorial</title>
</head>
<!-- Main visible page content starts here. -->
<body>
    <!-- Basic hyperlink:
         <a> = anchor element (link)
         href = destination URL -->
    <a href="https://www.google.com/">Go to google</a>
    <!-- Line break so each example appears on a new line -->
    <br>

    <!-- target="_blank" opens the link in a new tab/window -->
    <a href="https://www.google.com/" target="_blank">Go to google</a>
    <br>

    <!-- title attribute shows a small tooltip when hovering -->
    <a href="https://www.google.com/" title="goes to google">Go to google</a>
    <br>

    <!-- Example combining both attributes:
         target="_blank" + title -->
    <a href="https://www.google.com/" target="_blank" title="goes to google">Go to google</a>
    <br>

    <!-- mailto link:
         opens user's default email app with this address filled in -->
    <a href="mailto:dwip@dwip.dedyn.io">Mail Me</a>
</body>
</html>
