<!DOCTYPE html>
<!--
Tutorial File: tutorial_html/image.html
Lesson Title: Image/GIF Add
Purpose: This page is part of the course and is documented for beginners.
-->
<html lang="en">
<head>
    <!-- UTF-8 allows the page to display most characters correctly -->
    <meta charset="UTF-8">
    <!-- Makes layout fit different screen sizes (important for mobile) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Name shown in the browser tab -->
    <title>Image/GIF Add</title>
</head>
<!-- Main visible page content starts here. -->
<body>
    <!-- Section title for normal image example -->
    <h2>Image</h2>
    <!-- <img> displays an image file
         src = file path
         width = display width in pixels
         alt = text shown to screen readers or if image fails -->
    <img src="../assets/image.png" width="500" alt="an image">

    <!-- Visual separator -->
    <hr>

    <!-- Section title for GIF example -->
    <h2>GIF</h2>
    <!-- GIF is also shown with <img>; browser handles animation automatically -->
    <img src="../assets/earth.gif" width="500" alt="an GIF">
</body>
</html>
