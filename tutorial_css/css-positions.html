<body>
    <h1>CSS Position</h1>
    <p>Shows <code>static</code>, <code>relative</code>, <code>absolute</code>, <code>fixed</code>, and <code>sticky</code>.</p>
    <div class="static box">static (default)</div>
    <div class="relative box">relative (shifted with top/left)</div>
    <div class="parent">
        <div class="absolute box">absolute inside parent</div>
    </div>
    <div class="sticky box">sticky top: 0 (scroll to see effect)</div>
    <div class="spacer"></div>
    <div class="fixed">fixed</div>
</body>
