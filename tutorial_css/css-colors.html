<body>
    <h1>CSS Colors</h1>
    <p><!-- Explanation: CSS colors can be written using names, HEX, RGB, HSL, and transparency. -->This page demonstrates common color formats.</p>
    <div class="swatch named">Named color: <code>tomato</code></div>
    <div class="swatch hex">HEX color: <code>#1e90ff</code></div>
    <div class="swatch rgb">RGB color: <code>rgb(60, 179, 113)</code></div>
    <div class="swatch rgba">RGBA color: <code>rgba(138, 43, 226, 0.6)</code></div>
    <div class="swatch hsl">HSL color: <code>hsl(40, 100%, 50%)</code></div>
</body>
