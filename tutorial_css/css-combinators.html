<!-- Main visible page content starts here. -->
<body>
    <h1>CSS Combinators</h1>
    <p>Combinators describe relationships between selectors.</p>
    <div class="parent">
        <p>Child paragraph (selected by <code>div > p</code>)</p>
        <section>
            <p>Descendant paragraph (selected by <code>div p</code>)</p>
        </section>
    </div>
    <h3>Heading 1</h3>
    <p>Adjacent sibling paragraph (selected by <code>h3 + p</code>)</p>
    <p>General sibling paragraph (selected by <code>h3 ~ p</code>)</p>
</body>
